services:
  - type: web
    name: localmarketne-web
    env: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: bash scripts/render_start.sh
    envVars:
      # Core
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: PRIMARY_DOMAIN
        value: localmarketne.com
      # Set this to your service hostname in Render (e.g. localmarketne-web.onrender.com)
      - key: RENDER_EXTERNAL_HOSTNAME
        value: localmarketne.onrender.com
      - key: ALLOWED_HOSTS_EXTRA
        value: ""
      - key: CSRF_TRUSTED_ORIGINS_EXTRA
        value: ""

      # Migrations (recommended: run manually on first deploy, then enable)
      - key: RUN_MIGRATIONS_ON_START
        value: "0"

      # Database (Render injects DATABASE_URL when linked)
      - key: DATABASE_URL
        fromDatabase:
          name: localmarketne-db
          property: connectionString

      # Stripe (set these in Render UI for test/live)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # Email (set real SMTP values in Render UI)
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

      # Optional
      - key: RECAPTCHA_V3_SITE_KEY
        sync: false
      - key: RECAPTCHA_V3_SECRET_KEY
        sync: false

      # S3 (optional)
      - key: USE_S3
        value: "0"
      - key: AWS_S3_MEDIA_BUCKET
        sync: false
      - key: AWS_S3_REGION_NAME
        value: us-east-2
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

databases:
  - name: localmarketne-db
    plan: starter
