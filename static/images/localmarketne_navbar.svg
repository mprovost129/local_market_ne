<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1000" viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">

  <!-- Sun Disk (Minimal) -->
  <circle cx="700" cy="120" r="35" fill="#F36F21" opacity="0.9"/>

  <!-- Tree (Simplified Geometry) -->
  <circle cx="480" cy="360" r="65" fill="#4E8B3A"/>
  <rect x="468" y="360" width="24" height="90" fill="#6B3E26"/>

  <!-- Store Body -->
  <rect x="600" y="320" width="320" height="220" fill="#F6F4EE" stroke="#2F4F2F" stroke-width="5"/>

  <!-- Awning -->
  <rect x="600" y="280" width="320" height="70" fill="#F36F21" />
  <rect x="600" y="280" width="50" height="70" fill="white"/>
  <rect x="700" y="280" width="50" height="70" fill="white"/>
  <rect x="800" y="280" width="50" height="70" fill="white"/>

  <!-- Door -->
  <rect x="630" y="360" width="70" height="150" fill="#2F4F2F" />

  <!-- Window -->
  <rect x="730" y="360" width="150" height="110" fill="#DCE7EF" stroke="#2F4F2F" stroke-width="3"/>

  <!-- Ground Line -->
  <path d="M480 570 Q700 620 920 570" stroke="#2F4F2F" stroke-width="6" fill="none"/>

  <!-- Wordmark -->
  <text x="700" y="720" font-size="88" text-anchor="middle" fill="#2F4F2F" font-family="Montserrat, Arial, sans-serif" font-weight="600" letter-spacing="3">
    LOCAL MARKET
  </text>

  <!-- Subtle Ribbon -->
  <rect x="640" y="770" width="120" height="48" rx="6" fill="#F36F21" />
  <text x="700" y="804" font-size="34" text-anchor="middle" fill="white" font-family="Montserrat, Arial, sans-serif" font-weight="600">
    NE
  </text>

</svg>
