{# products/templates/products/seller/product_delete.html #}
{% extends "base.html" %}
{% block title %}Delete - {{ product.title }} - Local Market NE{% endblock %}

{% block content %}
<div class="container py-4 lm-page-wrap-sm">
  <div class="card shadow-sm">
    <div class="card-body">
      <h1 class="h5 mb-2">Delete listing</h1>
      <div class="text-secondary mb-3">This cannot be undone.</div>
      <div class="mb-3"><strong>{{ product.title }}</strong></div>

      <form method="post">
        {% csrf_token %}
        <a class="btn btn-secondary" href="{% url 'products:seller_list' %}">Cancel</a>
        <button class="btn btn-danger" type="submit"><i class="bi bi-trash me-1"></i>Delete</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
