{% extends "base.html" %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card lm-card">
        <div class="card-body p-4">
          <h1 class="h4 mb-2">Get updates</h1>
          <p class="text-secondary mb-4">Join the Local Market NE waitlist. We'll email you when new features launch.</p>

          {% if waitlist_disabled %}
            <div class="alert alert-secondary mb-0">
              Waitlist signup is temporarily disabled.
            </div>
          {% else %}
            <form method="post" class="vstack gap-3" data-disable-once data-recaptcha-action="waitlist_signup">
              {% csrf_token %}
              <input type="hidden" name="recaptcha_token" value="">
              <input type="hidden" name="source_path" value="{{ source|default:'' }}">

              <div>
                <label class="form-label" for="id_email">Email</label>
                <input id="id_email" name="email" type="email" class="form-control" placeholder="you@example.com" required>
              </div>

              <button type="submit" class="btn btn-primary">Join waitlist</button>

              <div class="small text-secondary">
                No spam. Unsubscribe anytime.
              </div>
            </form>
          {% endif %}

        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
